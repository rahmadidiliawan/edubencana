<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pilih Lagu</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="css/pilihan-lagu.css">

</head>

<body>

<div class="container">

    <h1>🎵 PILIH LAGU</h1>

    <p>
        Pilih salah satu lagu edukasi kebencanaan.
    </p>
<div class="lagu-list">

    <button class="lagu-btn" data-lagu="erupsi">

        🌋 Siaga Erupsi

    </button>

    <button class="lagu-btn" data-lagu="gempa">

        🌎 Siaga Gempa

    </button>

    <button class="lagu-btn" data-lagu="tsunami">

        🌊 Siaga Tsunami

    </button>

    <button class="lagu-btn" data-lagu="banjir">

        🌧️ Siaga Banjir

    </button>

    <button class="lagu-btn" data-lagu="longsor">

        ⛰️ Siaga Longsor

    </button>

    <button class="lagu-btn" data-lagu="karhutla">

        🔥 Siaga Karhutla

    </button>

    <button class="lagu-btn" data-lagu="banjirbandang">

        🏞️ Siaga Banjir Bandang

    </button>

</div>

</div>



<script src="js/pilihan-lagu.js"></script>

</body>

</html>
